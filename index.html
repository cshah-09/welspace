<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooted</title>

<link rel="icon" type="image/png" sizes="100x100" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'DM Sans',sans-serif;
background:#faf7f2;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
position:relative;
}

/* PARTICLES */
#particles{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* HEADER */
header{
margin-top:20px;
z-index:2;
}

h1{
font-family:'Playfair Display',serif;
font-size:2.5rem;
}

/* MAIN */
.main{
text-align:center;
margin-top:40px;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

#task{
font-family:'Caveat',cursive;
font-size:2.8rem;
max-width:420px;
text-align:center;
}

/* BUTTONS */
button{
padding:14px 30px;
border:none;
border-radius:40px;
font-family:'Caveat',cursive;
font-size:1.4rem;
background:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
}

/* MESSAGE */
#message{
margin-top:5px;
font-size:1rem;
color:#666;
}

/* TREE */
#plant{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
z-index:1;
pointer-events:none;
}

#plant svg{
animation:treesway 6s ease-in-out infinite;
transform-origin:bottom center;
}

/* GARDEN */
#garden{
position:fixed;
bottom:20px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:10px;
z-index:1;
flex-wrap:wrap;
}

/* ANIMATION */
@keyframes treesway{
0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}
}

/* COUNTER */
#counter{
position:absolute;
top:20px;
right:25px;
z-index:2;
}

/* FOOTER */
#footer{
position:fixed;
bottom:8px;
right:15px;
font-size:0.8rem;
color:#777;
z-index:2;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="counter"></div>

<header>
<h1>Rooted</h1>
</header>

<div class="main">

<div id="task"></div>

<div>
<button onclick="setMode('tree')">🌳 Tree</button>
<button onclick="setMode('garden')">🌸 Garden</button>
</div>

<button id="completeBtn" onclick="completeTask()">Task Completed!!</button>

<div id="message"></div>

</div>

<div id="plant"></div>
<div id="garden"></div>

<div id="footer">Rooted © 2026</div>

<script>

/* TASKS */
const tasks=[
"Drink 6 glasses of water today",
"Declutter one small space",
"Walk for 15 minutes",
"No phone 30 mins before sleep",
"Eat one fruit today",
"Write one gratitude note",
"Plan tomorrow in 3 bullet points"
];

while(tasks.length<366){
tasks.push(tasks[tasks.length%7]);
}

/* DATE */
const now=new Date();
const pst=new Date(now.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
const todayKey=pst.toDateString();

/* STORAGE */
let data=JSON.parse(localStorage.getItem("rooted"))||{
weekStart:todayKey,
completedDays:[],
trees:0,
mode:"tree",
garden:[]
};

/* MODE SWITCH */
function setMode(m){
data.mode=m;
localStorage.setItem("rooted",JSON.stringify(data));
renderAll();
}

/* WEEK CHECK */
function checkWeek(){

const start=new Date(data.weekStart);
const diff=Math.floor((pst-start)/(1000*60*60*24));

if(diff>=7){

if(data.completedDays.length===7){

if(data.mode==="tree"){
data.trees++;
}else{
addPlant();
}

setTimeout(()=>{
document.getElementById("message").innerText=
"couldn't afford the iphone apple but you deserve this one 🫶";
},300);
}

data.weekStart=todayKey;
data.completedDays=[];
localStorage.setItem("rooted",JSON.stringify(data));
}
}

checkWeek();

/* TASK */
document.getElementById("task").innerText=
tasks[(new Date().getDay()+data.trees*7)%tasks.length];

/* COMPLETE TASK */
function completeTask(){

if(data.completedDays.includes(todayKey)){
document.getElementById("message").innerText="heyy, only one task a day 🌿";
return;
}

data.completedDays.push(todayKey);
localStorage.setItem("rooted",JSON.stringify(data));

document.getElementById("completeBtn").style.display="none";

renderAll();

document.getElementById("message").innerText="Proud of you 🌱";
}

/* TREE */
function renderPlant(){

const plant=document.getElementById("plant");

if(data.mode!=="tree"){
plant.innerHTML="";
return;
}

const stage=data.completedDays.length;
const canopy=40+stage*10;

const apple=stage===7?`<circle cx="160" cy="95" r="7" fill="red"/>`:"";

plant.innerHTML=`
<svg width="260" height="260">
<rect x="120" y="120" width="14" height="100" fill="#7a4f2f"/>
<circle cx="127" cy="110" r="${canopy}" fill="#b8e6c1"/>
<circle cx="95" cy="115" r="${canopy*0.75}" fill="#c9f0d2"/>
<circle cx="160" cy="115" r="${canopy*0.75}" fill="#c9f0d2"/>
<circle cx="127" cy="80" r="${canopy*0.7}" fill="#d7f7df"/>
${apple}
</svg>
`;
}

/* GARDEN */
function addPlant(){
const plants=["🌸","🌼","🌻","🌷","🌿"];
data.garden.push(plants[Math.floor(Math.random()*plants.length)]);
}

function renderGarden(){

const g=document.getElementById("garden");

if(data.mode!=="garden"){
g.innerHTML="";
return;
}

g.innerHTML=data.garden.map(p=>`<div style="font-size:30px">${p}</div>`).join("");
}

/* RENDER ALL */
function renderAll(){
renderPlant();
renderGarden();

if(data.completedDays.includes(todayKey)){
document.getElementById("completeBtn").style.display="none";
}else{
document.getElementById("completeBtn").style.display="block";
}
}

renderAll();

/* COUNTER */
document.getElementById("counter").innerText=
"Total Trees Planted → "+data.trees;

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.3,
dy:(Math.random()-0.5)*0.3
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.fillStyle="rgba(120,180,255,0.9)";

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
