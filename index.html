<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooted</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<link rel="icon" type="image/png" sizes="100x100" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'DM Sans',sans-serif;
background:#faf7f2;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
position:relative;
padding-top:40px;
}

/* PARTICLES */
#particles{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* HEADER */
header{
margin-top:10px;
z-index:2;
}

h1{
font-family:'Playfair Display',serif;
font-size:2.5rem;
margin:0;
}

/* MAIN */
.main{
text-align:center;
margin-top:70px;
z-index:2;
}

#task{
font-family:'Caveat',cursive;
font-size:2.6rem;
max-width:420px;
margin-bottom:40px;
}

button{
padding:16px 36px;
border:none;
border-radius:40px;
font-family:'Caveat',cursive;
font-size:1.6rem;
background:white;
cursor:pointer;
}

#message{
margin-top:15px;
font-size:1rem;
color:#666;
}

/* TREE */
#plant{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
z-index:1;
}

#plant svg{
animation:treesway 6s ease-in-out infinite;
transform-origin:bottom center;
}

@keyframes treesway{
0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}
}

/* COUNTER */
#counter{
position:absolute;
top:20px;
right:25px;
z-index:2;
}

/* FOOTER */
#footer{
position:fixed;
bottom:8px;
right:15px;
font-size:0.8rem;
color:#777;
z-index:2;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="counter"></div>

<header>
<h1>Rooted</h1>
</header>

<div class="main">
<div id="task"></div>
<button id="completeBtn" onclick="completeTask()">Task Completed!!</button>
<div id="message"></div>
</div>

<div id="plant"></div>

<div id="footer">Rooted © 2026</div>

<script>

/* TASKS */
const tasks=[
"Drink 6 glasses of water today",
"Declutter one small space",
"Walk for 15 minutes",
"No phone 30 mins before sleep",
"Eat one fruit today",
"Write one gratitude note",
"Plan tomorrow in 3 bullet points"
];

while(tasks.length<366){
tasks.push(tasks[tasks.length%7]);
}

/* DATE */
const now=new Date();
const pst=new Date(now.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
const todayKey=pst.toDateString();

/* STORAGE */
let data=JSON.parse(localStorage.getItem("rooted"))||{
weekStart:todayKey,
completedDays:[],
trees:0
};

/* TASK DISPLAY */
document.getElementById("task").innerText=
tasks[(new Date().getDay()+data.trees*7)%tasks.length];

/* COMPLETE */
function completeTask(){

if(data.completedDays.includes(todayKey)){
document.getElementById("message").innerText="heyy, only one task a day 🌿";
return;
}

data.completedDays.push(todayKey);
localStorage.setItem("rooted",JSON.stringify(data));

renderPlant();

document.getElementById("message").innerText="Proud of you 🌱";
document.getElementById("completeBtn").style.display="none";
}

/* TREE */
function renderPlant(){

const stage=data.completedDays.length;
const plant=document.getElementById("plant");
const canopy=40+stage*10;

const apple=stage===7?`<circle cx="160" cy="95" r="7" fill="red"/>`:"";

plant.innerHTML=`
<svg width="260" height="260">
<rect x="120" y="120" width="14" height="100" fill="#7a4f2f"/>
<circle cx="127" cy="110" r="${canopy}" fill="#b8e6c1"/>
<circle cx="95" cy="115" r="${canopy*0.75}" fill="#c9f0d2"/>
<circle cx="160" cy="115" r="${canopy*0.75}" fill="#c9f0d2"/>
<circle cx="127" cy="80" r="${canopy*0.7}" fill="#d7f7df"/>
${apple}
</svg>
`;
}

renderPlant();

/* 🔥 THIS FIXES YOUR MAIN ISSUE */
if(data.completedDays.includes(todayKey)){
document.getElementById("completeBtn").style.display="none";
document.getElementById("message").innerText="heyy, only one task a day 🌿";
}

/* COUNTER */
document.getElementById("counter").innerText=
"Total Trees Planted → "+data.trees;

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.3,
dy:(Math.random()-0.5)*0.3
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.fillStyle="rgba(100,150,255,0.9)";
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
